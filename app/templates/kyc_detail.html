<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KYC</title><style>body{font-family:Arial;background:#0f172a;color:#e5e7eb;margin:0}.wrap{max-width:900px;margin:auto;padding:20px}.card{background:#111827;border:1px solid #334155;border-radius:16px;padding:16px;margin:12px 0}img{max-width:100%;border-radius:12px;border:1px solid #334155}button{padding:12px 18px;border:0;border-radius:12px;margin:5px}.ok{background:#16a34a;color:white}.bad{background:#dc2626;color:white}textarea{width:100%;height:80px;border-radius:12px}</style></head><body><div class="wrap"><a href="/">رجوع</a><h1>{{r.request_no}}</h1><div class="card"><p>الاسم: {{r.full_name}}</p><p>الهاتف: {{r.phone}}</p><p>العنوان: {{r.address}}</p><p>الغرض: {{r.purpose}}</p><p>التفاصيل: {{r.details}}</p><p>الحالة: {{r.status}}</p></div><div class="card"><h2>صورة الهوية</h2><img src="/file?path={{r.id_image}}"><h2>صورة السيلفي</h2><img src="/file?path={{r.selfie_image}}"></div><div class="card"><form method="post" action="/kyc/{{r.id}}/review"><textarea name="reason" placeholder="سبب الرفض اختياري"></textarea><br><button class="ok" name="status" value="مقبول">قبول وتفعيل</button><button class="bad" name="status" value="مرفوض">رفض</button></form></div></div></body></html>
